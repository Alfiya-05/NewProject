name: Node CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo (MANDATORY)
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3. Debug (so you NEVER get lost again)
      - name: Debug directory
        run: |
          pwd
          ls -la

      # 4. Install dependencies (simple, no drama)
      - name: Install dependencies
        run: npm install

      # 5. Build (optional, remove if not needed)
      - name: Build
        run: npm run build --if-present

      # 6. Test (optional)
      - name: Test
        run: npm test --if-present
