name: Next.js CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # 3. Debug (optional but smart)
      - name: Debug structure
        run: |
          echo "Root:"
          ls -la
          echo "Frontend:"
          ls -la frontend

      # 4. Install dependencies
      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      # 5. Build Next.js app
      - name: Build
        working-directory: ./frontend
        run: npm run build

      # 6. Run tests (if any)
      - name: Test
        working-directory: ./frontend
        run: npm test --if-present
