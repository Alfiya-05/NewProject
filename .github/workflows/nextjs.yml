name: Next.js CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Verify structure
        run: |
          echo "ROOT:"
          ls -la
          echo "FRONTEND:"
          ls -la frontend || echo "No frontend folder"

      - name: Install dependencies
        working-directory: ./frontend
        run: |
          if [ ! -f package.json ]; then
            echo "❌ package.json not found in frontend"
            exit 1
          fi
          npm install

      - name: Build
        working-directory: ./frontend
        run: npm run build || echo "⚠️ Build failed"

      - name: Done
        run: echo "Workflow completed"
